<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Công cụ tính số pallet - Nafarma., Ltd</title>
    <link rel="icon" type="image/png" href="https://nafarma.com/wp-content/uploads/2024/12/cropped-LOGO-TAGLINE-01-180x180.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Plus Jakarta Sans', sans-serif; color: #334155; }
        .glass-card { background: #ffffff; border-radius: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
        
        /* Pallet UI - Thiết kế chuyên nghiệp hơn */
        .pallet-box { width: 90px; height: 100px; border: 2px solid #cbd5e1; background: #f8fafc; border-radius: 8px 8px 0 0; position: relative; display: flex; align-items: flex-end; overflow: hidden; box-shadow: inset 0 2px 8px rgba(0,0,0,0.05); border-bottom: none; margin-bottom: 2px; }
        .pallet-fill { background: linear-gradient(to top, #2563eb, #60a5fa); width: 100%; transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0.95; }
        .pallet-base { width: 96px; height: 14px; background: #8b5a2b; border-radius: 2px; position: relative; left: -3px; box-shadow: 0 4px 6px rgba(0,0,0,0.15); background-image: linear-gradient(90deg, #603813 0%, #8b5a2b 50%, #603813 100%); border-bottom: 2px solid #4a290c;}
        .pallet-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; color: white; opacity: 0.9; }
        
        /* Biểu đồ tròn - Thiết kế dạng Gauge Chart hiện đại */
        .circular-chart { display: block; margin: 0 auto; max-width: 110px; max-height: 110px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #f1f5f9; stroke-width: 4; }
        .circle { fill: none; stroke: #10b981; stroke-width: 4; stroke-linecap: round; transition: stroke-dasharray 1s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Toggles & Disabled state */
        .toggle-checkbox:checked:not(:disabled) + .toggle-label { background-color: #0f52ba; border-color: #0f52ba; }
        .toggle-checkbox:checked:not(:disabled) + .toggle-label::after { transform: translateX(100%); border-color: white; }
        .toggle-checkbox:disabled + .toggle-label { cursor: not-allowed; opacity: 0.4; }

        /* Scrollbar cho danh sách tìm kiếm */
        #product-dropdown::-webkit-scrollbar { width: 6px; }
        #product-dropdown::-webkit-scrollbar-track { background: #f1f1f1; }
        #product-dropdown::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

            { id: 'SP40', name: "Olimestra20 (Hộp/2 vỉ X 14 viên)", boxesPerCarton: 128, caps: { 'Pallet L': 50, 'Pallet N': 25, 'Pallet 1A': 40 } },
            { id: 'SP41', name: "Oprymea 0.26 (Hộp 03 vỉ x 10 viên)", boxesPerCarton: 120, caps: { 'Pallet L': 50, 'Pallet N': 25, 'Pallet 1A': 40 } },
            { id: 'SP42', name: "Oprymea 0.52 (Hộp 03 vỉ x 10 viên)", boxesPerCarton: 120, caps: { 'Pallet L': 50, 'Pallet N': 25, 'Pallet 1A': 40 } },
            { id: 'SP43', name: "Terminus (Hộp 1 chai x 30ml)", boxesPerCarton: 100, caps: { 'Pallet L': 40, 'Pallet N': 20, 'Pallet 1A': 40 } },
            { id: 'SP44', name: "Torendo Q1 (Hộp/03 vỉ X 10 viên)", boxesPerCarton: 160, caps: { 'Pallet L': 50, 'Pallet N': 25, 'Pallet 1A': 40 } },
            { id: 'SP45', name: "Torendo Q2 (Hộp 03 vỉ X 10 viên)", boxesPerCarton: 120, caps: { 'Pallet L': 50, 'Pallet N': 25, 'Pallet 1A': 40 } },
            { id: 'SP46', name: "Yradan 10 (Hộp 03 vỉ x 10 viên)", boxesPerCarton: 120, caps: { 'Pallet L': 50, 'Pallet N': 25, 'Pallet 1A': 40 } },
            { id: 'SP47', name: "Yradan 5 (Hộp 03 vỉ X 10 viên)", boxesPerCarton: 160, caps: { 'Pallet L': 50, 'Pallet N': 25, 'Pallet 1A': 40 } }
        ];

        const PL_TYPES = [
            { id: 'Pallet L', name: 'Pallet' },
            { id: 'Pallet N', name: 'Pallet' },
            { id: 'Pallet T1', name: 'Pallet' },
            { id: 'Pallet T2', name: 'Pallet' },
            { id: 'Pallet 1A', name: 'Pallet' }
        ];

        function init() {
            renderDropdownList(DATABASE);
            
            // Ẩn dropdown khi click ra ngoài
            document.addEventListener('click', function(e) {
                if (!document.getElementById('product-search').contains(e.target) && !document.getElementById('product-dropdown').contains(e.target)) {
                    hideDropdown();
                }
            });
        }

        // --- CÁC HÀM XỬ LÝ TÌM KIẾM ---
        function renderDropdownList(list) {
            const ul = document.getElementById('product-dropdown');
            ul.innerHTML = '';
            if(list.length === 0) {
                ul.innerHTML = '<li class="p-4 text-sm text-slate-500 text-center italic">Không tìm thấy sản phẩm</li>';
                return;
            }
            list.forEach(p => {
                ul.innerHTML += `<li onclick="selectProduct('${p.id}', '${p.name}')" class="p-3 hover:bg-blue-50 cursor-pointer text-sm font-bold text-slate-700 transition-colors">${p.name} <span class="text-xs text-slate-400 font-normal block mt-0.5">Quy cách: ${p.boxesPerCarton} hộp/thùng</span></li>`;
            });
        }

        function filterProducts() {
            const keyword = document.getElementById('product-search').value.toLowerCase();
            const filtered = DATABASE.filter(p => p.name.toLowerCase().includes(keyword));
            renderDropdownList(filtered);
            showDropdown();
        }

        function showDropdown() { document.getElementById('product-dropdown').classList.remove('hidden'); }
        function hideDropdown() { document.getElementById('product-dropdown').classList.add('hidden'); }

        function selectProduct(id, name) {
            document.getElementById('product-select').value = id;
            document.getElementById('product-search').value = name;
            hideDropdown();
            handleProductChange();
        }

        function handleProductChange() {
            renderToggles();
            calculateFromBoxes();
        }

        function renderToggles() {
            const container = document.getElementById('pallet-toggles-container');
            const productId = document.getElementById('product-select').value;
            const product = DATABASE.find(p => p.id === productId);
            if (!product) return;
            
            container.innerHTML = "";
            PL_TYPES.forEach(pl => {
                const capacity = product.caps[pl.id];
                const hasData = capacity && capacity > 0;
                const isChecked = hasData && ['Pallet L', 'Pallet N', 'Pallet T1'].includes(pl.id) ? 'checked' : ''; 
                const disabledAttr = hasData ? '' : 'disabled';
                const wrapperStyle = hasData ? 'hover:border-blue-300' : 'bg-slate-50 opacity-70';
                const capacityHTML = hasData 
                    ? `<span class="font-bold text-blue-600">${capacity} Thùng</span>` 
                    : `<span class="font-bold text-red-400 italic">Không có dữ liệu</span>`;
                
                container.innerHTML += `
                    <div class="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-xl transition-colors ${wrapperStyle}">
                        <div>
                            <div class="font-bold text-slate-700 text-sm">${pl.id}</div>
                            <div class="text-xs text-slate-500 mt-1">${pl.name} - ${capacityHTML}</div>
                        </div>
                        <label class="relative inline-flex items-center ${hasData ? 'cursor-pointer' : 'cursor-not-allowed'}">
                            <input type="checkbox" id="toggle-${pl.id}" class="toggle-checkbox sr-only peer" ${isChecked} ${disabledAttr}>
                            <div class="toggle-label w-11 h-6 bg-slate-200 border-2 border-slate-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 transition-all after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:border-slate-300 after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                        </label>
                    </div>
                `;
            });
        }

        function calculateFromBoxes() {
            const productId = document.getElementById('product-select').value;
            const product = DATABASE.find(p => p.id === productId);
            if(!product) return;
            const boxesStr = document.getElementById('input-boxes').value;
            
            if (!boxesStr || boxesStr.trim() === "") {
                document.getElementById('input-cartons').value = "";
                document.getElementById('box-breakdown').innerText = "";
                return;
            }

            const boxes = parseInt(boxesStr);
            if (boxes <= 0) return;

            const fullCartons = Math.floor(boxes / product.boxesPerCarton);
            const remainderBoxes = boxes % product.boxesPerCarton;
            let totalCartons = fullCartons;
            let breakdownText = "";

            if (remainderBoxes === 0) {
                breakdownText = `= ${fullCartons} thùng chẵn`;
            } else {
                totalCartons += 1;
                breakdownText = `= ${fullCartons} thùng + 1 thùng lẻ (${remainderBoxes} hộp)`;
            }

            document.getElementById('input-cartons').value = totalCartons;
            document.getElementById('box-breakdown').innerText = breakdownText;
        }

        function clearBoxesOnCartonInput() {
            document.getElementById('input-boxes').value = "";
            document.getElementById('box-breakdown').innerText = "";
        }

        function runOptimization() {
            const totalCartons = parseInt(document.getElementById('input-cartons').value) || 0;
            const productId = document.getElementById('product-select').value;
            if (totalCartons <= 0 || !productId) {
                alert("Vui lòng nhập số lượng và chọn sản phẩm!");
                return;
            }

            const product = DATABASE.find(p => p.id === productId);

            let activePallets = PL_TYPES.map(pl => {
                return {
                    id: pl.id,
                    cap: product.caps[pl.id] || 0,
                    active: document.getElementById(`toggle-${pl.id}`).checked
                };
            }).filter(p => p.active && p.cap > 0).sort((a, b) => b.cap - a.cap);

            if (activePallets.length === 0) {
                alert("Vui lòng BẬT ít nhất 1 loại Pallet có dữ liệu!");
                return;
            }

            let remaining = totalCartons;
            let resultList = {};
            let dockHtml = "";
            let totalCapacityUsed = 0;
            let totalPalletsCount = 0;
            let palletIndex = 1; // Khởi tạo số thứ tự

            activePallets.forEach(p => {
                let count = Math.floor(remaining / p.cap);
                if (count > 0) {
                    resultList[p.id] = count;
                    for (let i = 0; i < count; i++) {
                        dockHtml += renderPalletBox(p.id, p.cap, p.cap, palletIndex++);
                        totalCapacityUsed += p.cap;
                        totalPalletsCount++;
                    }
                    remaining -= count * p.cap;
                }
            });

            if (remaining > 0) {
                let smallestPallet = activePallets[activePallets.length - 1];
                resultList[smallestPallet.id] = (resultList[smallestPallet.id] || 0) + 1;
                dockHtml += renderPalletBox(smallestPallet.id, remaining, smallestPallet.cap, palletIndex++);
                totalCapacityUsed += smallestPallet.cap;
                totalPalletsCount++;
            }

            document.getElementById('dock-view').innerHTML = dockHtml;
            document.getElementById('res-total-pallets').innerText = totalPalletsCount;
            
            const efficiency = Math.round((totalCartons / totalCapacityUsed) * 100);
            document.getElementById('res-efficiency-text').innerText = efficiency + "%";
            document.getElementById('res-eff-badge').innerText = efficiency + "%";
            
            const strokeDash = `${efficiency}, 100`;
            document.getElementById('efficiency-circle').setAttribute('stroke-dasharray', strokeDash);

            let packingText = [];
            for (const [id, count] of Object.entries(resultList)) {
                packingText.push(`${count}x ${id}`);
            }
            document.getElementById('res-packing-list').innerText = packingText.join("\n");
        }

        function renderPalletBox(type, fill, max, index) {
            const heightPerc = (fill / max) * 100;
            const iconSvg = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-sm"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>`;
            
            return `
                <div class="flex flex-col items-center w-[100px] mb-6 mx-2 transition-all hover:-translate-y-1">
                    <div class="text-[13px] font-black text-slate-400 mb-1">#${index}</div>
                    <div class="pallet-box">
                        <div class="pallet-icon">${iconSvg}</div>
                        <div class="pallet-fill" style="height: ${heightPerc}%"></div>
                    </div>
                    <div class="pallet-base"></div>
                    <div class="mt-3 text-center w-full">
                        <div class="text-[10px] font-black text-blue-800 bg-blue-50 border border-blue-100 rounded px-2 py-1 tracking-wider uppercase">${type}</div>
                        <div class="text-[12px] font-bold text-slate-600 mt-1">${fill} <span class="text-[10px] font-medium text-slate-400">/ ${max}</span></div>
                    </div>
                </div>`;
        }

        init();
    </script>
</body>
</html>
