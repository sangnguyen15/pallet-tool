        html { font-size: 95%; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* Toggle Switch */
        .toggle-checkbox:checked { right: 0; border-color: #3B82F6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3B82F6; }
        .toggle-checkbox { right: 0; z-index: 1; border-color: #e2e8f0; transition: all 0.3s; }
        .toggle-label { background-color: #cbd5e1; transition: all 0.3s; }

        /* Pallet Box - Nhỏ lại 5% */
        .pallet-box { width: 76px; height: 90px; border: 3px solid #3b82f6; background: #eff6ff; border-radius: 6px 6px 0 0; position: relative; display: flex; align-items: flex-end; overflow: hidden; box-shadow: inset 0 2px 8px rgba(0,0,0,0.05); border-bottom: none;}
        .pallet-fill { background: linear-gradient(to top, #2563eb, #60a5fa); width: 100%; transition: height 0.6s ease; opacity: 0.95; position: relative; }
        .pallet-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.3); }
        .pallet-base { width: 86px; height: 12px; background: #8b5a2b; border-radius: 2px; position: relative;box-shadow: 0 4px 6px rgba(0,0,0,0.15); background-image: linear-gradient(90deg, #603813 0%, #8b5a2b 50%, #603813 100%); display: flex; justify-content: space-between; padding: 0 4px; border-bottom: 2px solid #4a290c;}
        .pallet-base::before, .pallet-base::after, .pallet-base i { content: ''; width: 6px; height: 100%; background: #4a290c; }
        
        /* Tên sản phẩm giữa Icon */
        .pallet-icon-text { position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%); z-index: 10; color: rgb(15, 15, 15); text-align: center; font-size: 10px; font-weight: 800; line-height: 1.2; text-shadow: 0px 1px 3px rgba(0,0,0,0.8); padding: 0 4px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; pointer-events: none;}

        .circular-chart { display: block; margin: 0 auto; max-width: 110px; max-height: 110px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #f1f5f9; stroke-width: 4; }
        .circle { fill: none; stroke: #10b981; stroke-width: 4; stroke-linecap: round; transition: stroke-dasharray 1s ease; }
    </style>
</head>

    // Khởi tạo
    function init() {

        const id = rowCounter;

        const index = activeRows.length;
        const zIndex = 50 - index;

        activeRows = activeRows.filter(rId => rId !== id);
        
        // Đánh số lại
        activeRows.forEach((rId, index) => {
            const label = document.querySelector(`#row-${rId} .row-label`);
            if(label) label.innerText = `Sản phẩm #${index + 1}`;
        });
        updateUIState();
    }

    function clearAllData() {
        if (confirm("Xóa toàn bộ dữ liệu đang nhập?")) {
            document.getElementById('product-rows-container').innerHTML = '';
            activeRows = [];
            rowCounter = 0;
            addProductRow();
        }
    }

    function updateUIState() {
        const btnAdd = document.getElementById('add-product-btn');
        const warn = document.getElementById('max-item-warning');
        if (activeRows.length >= MAX_ROWS) {
            btnAdd.style.display = 'none';
            warn.classList.remove('hidden');
        } else {
            btnAdd.style.display = 'flex';
            warn.classList.add('hidden');
        }
    }

    // --- AUTOCOMPLETE & TÍNH TOÁN DỮ LIỆU TỪNG DÒNG ---
    function filterProducts(id) {
        const kw = document.getElementById(`search-${id}`).value.toLowerCase();
        const filtered = DATABASE.filter(p => p.name.toLowerCase().includes(kw));
        const ul = document.getElementById(`dropdown-${id}`);
        ul.innerHTML = '';
        
        if(!filtered.length) {
            ul.innerHTML = '<li class="p-3 text-xs text-slate-400 italic text-center">Không tìm thấy</li>';
        } else {
            filtered.forEach(p => {
                const safeName = p.name.replace(/'/g, "\\'");
                ul.innerHTML += `
                    <li onclick="selectProduct(${id}, '${p.id}', '${safeName}')" class="p-2.5 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700">
                        ${p.name} <span class="text-[10px] text-slate-400 font-normal block mt-0.5">QC: ${p.boxesPerCarton} hộp/thùng</span>
                    </li>`;
            });
        }
        showDropdown(id);
    }

    function showDropdown(id) { 
        activeRows.forEach(r => { if(r!==id) hideDropdown(r); });
        document.getElementById(`dropdown-${id}`).classList.remove('hidden'); 
    }
    function hideDropdown(id) { document.getElementById(`dropdown-${id}`).classList.add('hidden'); }

    function selectProduct(id, prodId, prodName) {
        document.getElementById(`select-${id}`).value = prodId;
        document.getElementById(`search-${id}`).value = prodName;
        hideDropdown(id);
        renderConfigs(id, prodId);
        calcCartons(id);
    }

    // Render Cấu hình Pallet to (w-110px), 3 dòng theo yêu cầu 5
    function renderConfigs(id, prodId) {
        const container = document.getElementById(`config-${id}`);
        const product = DATABASE.find(p => p.id === prodId);
        if (!product) return;

        let html = '';
        PL_TYPES.forEach(pl => {
            const cap = product.caps[pl.id];
            const hasData = cap && cap > 0;
            // Mặc định bật Pallet L, N, T1 nếu có data
            const checked = hasData && ['Pallet L', 'Pallet N', 'Pallet T1'].includes(pl.id) ? 'checked' : '';
            const disabled = hasData ? '' : 'disabled';
            const bgClass = hasData ? 'border-blue-400 bg-blue-50 shadow-sm' : 'border-slate-200 bg-white opacity-60';
            const capText = hasData ? `<span class="text-blue-700">${cap}</span>` : `<span class="text-red-400">-</span>`;

            html += `
            <div class="border rounded-[10px] py-2 px-1 w-[100px] flex flex-col items-center justify-between gap-1.5 transition-all ${bgClass}">
                <span class="font-bold text-[12px] ${hasData ? 'text-blue-900' : 'text-slate-500'} tracking-tight">${pl.id}</span>
                
                <label class="relative inline-flex items-center ${hasData ? 'cursor-pointer' : 'cursor-not-allowed'} scale-90">
                    <input type="checkbox" id="toggle-${id}-${pl.id}" class="toggle-checkbox sr-only peer" ${checked} ${disabled}>
                    <div class="toggle-label w-10 h-5 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
                </label>

                <span class="text-[10px] font-bold ${hasData ? 'text-slate-600' : 'text-slate-400'}">Sức chứa: ${capText}</span>
            </div>`;
        });
        container.innerHTML = html;
    }

    function calcCartons(id) {
        const prodId = document.getElementById(`select-${id}`).value;
        const boxesStr = document.getElementById(`boxes-${id}`).value;
        const cartonInp = document.getElementById(`cartons-${id}`);
        const breakDiv = document.getElementById(`breakdown-${id}`);
        
        if (!prodId || !boxesStr) { cartonInp.value = ""; breakDiv.innerHTML = ""; return; }
        
        const product = DATABASE.find(p => p.id === prodId);
        const boxes = parseInt(boxesStr);
        if (boxes <= 0) return;

        const full = Math.floor(boxes / product.boxesPerCarton);
        const rem = boxes % product.boxesPerCarton;
        
        cartonInp.value = full + (rem > 0 ? 1 : 0);
        
        // Yêu cầu 6: Hiển thị đầy đủ, tự xuống dòng
        if(rem === 0) {
            breakDiv.innerHTML = `= ${full} thùng chẵn`;
        } else {
            breakDiv.innerHTML = `= ${full} thùng + 1 thùng lẻ (<span class="font-black text-red-500">${rem} hộp</span>)`;
        }
    }

    function clearBoxes(id) {
        document.getElementById(`boxes-${id}`).value = "";
        document.getElementById(`breakdown-${id}`).innerHTML = "";
    }

    // --- THUẬT TOÁN TỐI ƯU HÓA (Yêu cầu 8, 9) ---
    function runOptimization() {
        let totalGlobalCartons = 0;
        let totalGlobalCapacity = 0;
        let totalGlobalPallets = 0;
        let finalDockHtml = "";
        let finalPackingList = {};
        let palletIdx = 1;
        let hasError = false;

        // Quét kiểm tra lỗi (Yêu cầu 9)
        let validRowsCount = 0;
        for (let i = 0; i < activeRows.length; i++) {
            const id = activeRows[i];
            const prodId = document.getElementById(`select-${id}`).value;
            const cartonsStr = document.getElementById(`cartons-${id}`).value;
            
            // Bỏ qua nếu dòng trống hoàn toàn
            if (!prodId && !cartonsStr) continue;

            if (!prodId) { alert(`Sản phẩm #${i+1}: Vui lòng chọn Tên thuốc!`); hasError = true; break; }
            const cartons = parseInt(cartonsStr);
            if (!cartons || cartons <= 0) { alert(`Sản phẩm #${i+1}: Vui lòng nhập số lượng hợp lệ!`); hasError = true; break; }
            validRowsCount++;
        }
        if (hasError) return;
        if (validRowsCount === 0) { alert("Vui lòng nhập liệu ít nhất 1 sản phẩm để tính toán!"); return; }

        // Bắt đầu tính toán RIÊNG TỪNG SẢN PHẨM
        activeRows.forEach(id => {
            const prodId = document.getElementById(`select-${id}`).value;
            const cartons = parseInt(document.getElementById(`cartons-${id}`).value);
            if (!prodId || !cartons) return;

            const product = DATABASE.find(p => p.id === prodId);
            totalGlobalCartons += cartons;

            // Lấy các Pallet ĐƯỢC BẬT CHO SẢN PHẨM NÀY & Sắp xếp giảm dần (Lớn nhất tính trước)
            let activePallets = PL_TYPES.map(pl => {
                const toggle = document.getElementById(`toggle-${id}-${pl.id}`);
                return { id: pl.id, code: pl.code, cap: product.caps[pl.id] || 0, active: toggle ? toggle.checked : false };
            }).filter(p => p.active && p.cap > 0).sort((a, b) => b.cap - a.cap);

            if (activePallets.length === 0) {
                alert(`Sản phẩm "${product.name}" chưa bật Pallet nào có sức chứa!`);
                return; // Có thể sẽ break luồng, nhưng trong forEach nó chỉ return function con
            }

            let remaining = cartons;
            
            // Thuật toán: Ưu tiên Pallet lớn nhất trước.
            while (remaining > 0) {
                let selectedPallet = null;

                // Tìm 1 Pallet NHỎ NHẤT có khả năng chứa TRỌN phần còn lại (để không lãng phí pallet to)
                for (let i = activePallets.length - 1; i >= 0; i--) {
                    if (activePallets[i].cap >= remaining) {
                        selectedPallet = activePallets[i];
                        break;
                    }
                }

                // Nếu không có cái nào chứa trọn được (số lượng quá lớn) -> Dùng cái LỚN NHẤT
                if (!selectedPallet) {
                    selectedPallet = activePallets[0]; 
                }

                const key = `${selectedPallet.code} (${product.name})`;
                finalPackingList[key] = (finalPackingList[key] || 0) + 1;
                
                // Vẽ Pallet ra
                const fillAmount = Math.min(remaining, selectedPallet.cap);
                finalDockHtml += renderPalletBox(selectedPallet.code, product.name, fillAmount, selectedPallet.cap, palletIdx++);
                
                totalGlobalCapacity += selectedPallet.cap;
                totalGlobalPallets++;
                remaining -= selectedPallet.cap;
            }
        });

        // Ghi Kết quả ra giao diện
        document.getElementById('dock-view').innerHTML = finalDockHtml;
        document.getElementById('res-total-pallets').innerText = totalGlobalPallets;
        
        const eff = totalGlobalCapacity > 0 ? Math.round((totalGlobalCartons / totalGlobalCapacity) * 100) : 0;
        document.getElementById('res-efficiency-text').innerText = eff + "%";
        document.getElementById('res-eff-badge').innerText = eff + "%";
        document.getElementById('efficiency-circle').setAttribute('stroke-dasharray', `${eff}, 100`);

        let packingArr = [];
        for (const [key, count] of Object.entries(finalPackingList)) packingArr.push(`${count}x ${key}`);
        document.getElementById('res-packing-list').innerText = packingArr.join("\n");
    }

    // Yêu cầu 7 & 12: Icon Pallet nhỏ hơn 5% (w-[76px]), tên SP chính giữa
    function renderPalletBox(code, prodName, fill, max, idx) {
    const perc = (fill / max) * 100;
    return `
        <div class="flex flex-col items-center w-[86px]"> 
            <div class="text-[10px] font-black text-slate-400 mb-1">#${String(idx).padStart(2, '0')}</div>
            <div class="pallet-box">
                <div class="pallet-icon-text" title="${prodName}">${prodName}</div>
                <div class="pallet-fill" style="height: ${perc}%"></div>
            </div>
            <div class="pallet-base"><i></i><i></i><i></i></div>
            <div class="mt-1.5 text-center w-full">
                <div class="text-[9px] font-black text-blue-800 bg-blue-50 border border-blue-200 rounded px-1 py-0.5 tracking-tighter uppercase mb-1 whitespace-nowrap">${code}</div>
                <div class="text-[11px] font-black text-slate-700">${fill}/${max}</div>
            </div>
        </div>`;
}

    // Chạy khi tải trang
    init();
</script>
